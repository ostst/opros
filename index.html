<!DOCTYPE html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#f0f2f6" />
    <title>Опрос — Академия ПСБ</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        --bg: #f0f2f6;
        --surface: #ffffff;
        --border: #dde1ea;
        --text: #1c1f26;
        --muted: #5c6473;
        --navy: #2b2c84;
        --orange: #ea5614;
        --navy-soft: rgba(43, 44, 132, 0.08);
        --radius: 16px;
        --radius-sm: 12px;
        --font: "Manrope", system-ui, sans-serif;
        --safe-bottom: env(safe-area-inset-bottom, 0px);
      }
      *,
      *::before,
      *::after {
        box-sizing: border-box;
      }
      html {
        -webkit-text-size-adjust: 100%;
      }
      body {
        margin: 0;
        min-height: 100dvh;
        font-family: var(--font);
        background: var(--bg);
        color: var(--text);
        line-height: 1.45;
      }
      body::before {
        content: "";
        position: fixed;
        inset: 0;
        pointer-events: none;
        background: radial-gradient(ellipse 90% 60% at 50% -15%, rgba(43, 44, 132, 0.07), transparent 50%),
          radial-gradient(ellipse 70% 40% at 100% 100%, rgba(234, 86, 20, 0.05), transparent 45%);
        z-index: 0;
      }
      .shell {
        position: relative;
        z-index: 1;
        max-width: 1180px;
        margin: 0 auto;
        padding: 20px 20px calc(28px + var(--safe-bottom));
      }
      .topbar {
        display: flex;
        align-items: center;
        gap: 16px;
        flex-wrap: wrap;
        margin-bottom: 16px;
      }
      .brand {
        margin-bottom: 0;
      }
      .brand-link {
        display: inline-block;
        line-height: 0;
        text-decoration: none;
      }
      .brand-logo {
        height: 36px;
        width: auto;
        display: block;
      }
      .setup-warning {
        background: #fff8e6;
        border: 1px solid #f0d78c;
        border-radius: var(--radius-sm);
        padding: 14px 16px;
        margin-bottom: 20px;
        font-size: 0.9rem;
        color: #5c4a1a;
      }
      .setup-warning code {
        font-size: 0.82em;
        background: rgba(0, 0, 0, 0.06);
        padding: 2px 6px;
        border-radius: 4px;
      }
      .layout {
        display: grid;
        grid-template-columns: minmax(0, 1fr) minmax(280px, 1fr);
        gap: 24px;
        align-items: start;
      }
      .layout--survey-only {
        grid-template-columns: 1fr;
      }
      .live-col--hidden {
        display: none !important;
      }
      @media (max-width: 960px) {
        .layout:not(.layout--stats-only) {
          grid-template-columns: 1fr;
        }
      }
      .layout--stats-only {
        grid-template-columns: 1fr;
      }
      .layout--stats-only .survey-col {
        display: none;
      }
      .layout--stats-only .live-col {
        max-width: 900px;
        margin: 0 auto;
      }
      .survey-col {
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: var(--radius);
        padding: 22px 20px 24px;
        box-shadow: 0 4px 24px rgba(28, 31, 38, 0.06);
      }
      .live-col {
        position: sticky;
        top: 16px;
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: var(--radius);
        padding: 16px 16px 18px;
        box-shadow: 0 4px 24px rgba(28, 31, 38, 0.06);
        max-height: calc(100dvh - 48px);
        overflow: auto;
      }
      @media (max-width: 960px) {
        .live-col {
          position: relative;
          top: 0;
          max-height: none;
          order: 2;
        }
        .survey-col {
          order: 1;
        }
      }
      .live-title {
        margin: 0 0 12px;
        font-size: 0.75rem;
        letter-spacing: 0.08em;
        text-transform: uppercase;
        color: var(--muted);
        font-weight: 600;
      }
      .live-meta {
        font-size: 0.8125rem;
        color: var(--muted);
        margin: 0 0 14px;
      }
      .live-meta strong {
        color: var(--text);
      }
      .mini-block {
        margin-bottom: 16px;
        padding-bottom: 14px;
        border-bottom: 1px solid var(--border);
      }
      .mini-block:last-child {
        margin-bottom: 0;
        padding-bottom: 0;
        border-bottom: none;
      }
      .mini-q {
        font-size: 0.78rem;
        font-weight: 600;
        color: var(--navy);
        margin: 0 0 8px;
        line-height: 1.35;
      }
      .mini-row {
        display: grid;
        grid-template-columns: 1fr minmax(72px, 28%) auto;
        gap: 6px 8px;
        align-items: center;
        margin-bottom: 6px;
        font-size: 0.72rem;
      }
      @media (max-width: 400px) {
        .mini-row {
          grid-template-columns: 1fr;
        }
      }
      .mini-label {
        color: #3a4150;
        line-height: 1.3;
      }
      .mini-track {
        height: 6px;
        border-radius: 999px;
        background: rgba(43, 44, 132, 0.1);
        overflow: hidden;
      }
      .mini-fill {
        height: 100%;
        border-radius: inherit;
        background: linear-gradient(90deg, var(--navy), #5a5cb8);
        transition: width 0.35s ease;
      }
      .mini-pct {
        font-weight: 700;
        font-size: 0.8rem;
        text-align: right;
        font-variant-numeric: tabular-nums;
      }
      .mini-n {
        font-size: 0.72rem;
        color: var(--muted);
        text-align: right;
      }
      .kicker {
        font-size: 0.75rem;
        letter-spacing: 0.1em;
        text-transform: uppercase;
        color: var(--muted);
        margin: 0 0 14px;
      }
      .progress-wrap {
        display: flex;
        flex-direction: column;
        gap: 8px;
        margin-bottom: 20px;
      }
      .progress-track {
        height: 6px;
        border-radius: 999px;
        background: rgba(43, 44, 132, 0.12);
        overflow: hidden;
      }
      .progress-fill {
        height: 100%;
        border-radius: inherit;
        background: linear-gradient(90deg, var(--navy), #4547b3);
        transition: width 0.35s ease;
      }
      .progress-label {
        font-size: 0.8125rem;
        color: var(--muted);
      }
      .question-title {
        font-size: 1.1rem;
        font-weight: 600;
        margin: 0 0 18px;
        line-height: 1.4;
      }
      @media (min-width: 600px) {
        .question-title {
          font-size: 1.2rem;
        }
      }
      .options {
        list-style: none;
        margin: 0;
        padding: 0;
        display: flex;
        flex-direction: column;
        gap: 10px;
      }
      .option {
        width: 100%;
        display: flex;
        gap: 12px;
        align-items: flex-start;
        text-align: left;
        padding: 14px 16px;
        border-radius: var(--radius-sm);
        border: 1px solid var(--border);
        background: #fafbfc;
        color: var(--text);
        font: inherit;
        cursor: pointer;
        transition: border-color 0.2s ease, box-shadow 0.2s ease, transform 0.15s ease;
        min-height: 48px;
      }
      .option:hover {
        border-color: rgba(43, 44, 132, 0.35);
        box-shadow: 0 4px 14px rgba(43, 44, 132, 0.08);
      }
      .option:active {
        transform: scale(0.99);
      }
      .option[aria-pressed="true"] {
        border-color: var(--navy);
        background: var(--navy-soft);
        box-shadow: 0 0 0 1px rgba(43, 44, 132, 0.2);
      }
      .option-letter {
        flex-shrink: 0;
        width: 28px;
        height: 28px;
        display: flex;
        align-items: center;
        justify-content: center;
        border-radius: 8px;
        font-weight: 700;
        font-size: 0.875rem;
        background: rgba(43, 44, 132, 0.1);
        color: var(--navy);
      }
      .option[aria-pressed="true"] .option-letter {
        background: var(--navy);
        color: #fff;
      }
      .option-text {
        font-size: 0.9375rem;
        color: #3a4150;
      }
      .actions {
        display: flex;
        gap: 12px;
        margin-top: 22px;
        padding-top: 8px;
      }
      .btn-primary {
        flex: 1;
        font: inherit;
        font-weight: 600;
        border-radius: 12px;
        padding: 14px 20px;
        border: none;
        cursor: pointer;
        min-height: 48px;
        background: var(--navy);
        color: #fff;
        box-shadow: 0 6px 20px rgba(43, 44, 132, 0.25);
      }
      .btn-primary:hover:not(:disabled) {
        filter: brightness(1.05);
      }
      .btn-primary:disabled {
        opacity: 0.45;
        cursor: not-allowed;
      }
      .btn-ghost {
        flex: 0 0 auto;
        font: inherit;
        font-weight: 600;
        border-radius: 12px;
        padding: 14px 20px;
        min-height: 48px;
        background: var(--surface);
        color: var(--muted);
        border: 1px solid var(--border);
        cursor: pointer;
      }
      .btn-ghost:disabled {
        opacity: 0.45;
        cursor: not-allowed;
      }
      .btn-danger {
        background: #fff;
        color: #b42318;
        border: 1px solid #f5c4c0;
      }
      .err {
        color: #c41e1e;
        font-size: 0.875rem;
        margin: 8px 0 0;
      }
      .thanks {
        text-align: center;
        padding: 28px 8px 12px;
      }
      .thanks svg {
        color: var(--navy);
        margin-bottom: 12px;
      }
      .thanks h1 {
        font-size: 1.25rem;
        margin: 0 0 8px;
      }
      .thanks p {
        margin: 0;
        color: var(--muted);
        font-size: 0.9375rem;
      }
      .thanks-sub {
        margin-top: 12px !important;
        max-width: 22em;
        margin-left: auto;
        margin-right: auto;
      }
      .panel {
        display: flex;
        flex-direction: column;
      }
      .big-stats .mini-row {
        font-size: 0.85rem;
      }
      .big-stats .mini-q {
        font-size: 0.95rem;
      }
      .welcome {
        padding: 12px 4px 8px;
      }
      .welcome-title {
        font-size: 1.6rem;
        font-weight: 700;
        line-height: 1.25;
        margin: 0 0 18px;
        color: var(--navy);
      }
      @media (min-width: 600px) {
        .welcome-title {
          font-size: 1.9rem;
        }
      }
      .welcome-desc {
        font-size: 0.9375rem;
        color: var(--muted);
        margin: 0 0 12px;
        line-height: 1.6;
        max-width: 38em;
      }
      .welcome-actions {
        margin-top: 28px;
      }
      .welcome-actions .btn-primary {
        max-width: 240px;
      }
    </style>
  </head>
  <body>
    <div class="shell">
      <div class="topbar">
        <header class="brand">
          <a class="brand-link" href="https://psb-academy.ru/" target="_blank" rel="noopener noreferrer">
            <img class="brand-logo" src="assets/logo.svg" width="160" height="44" alt="Академия ПСБ" />
          </a>
        </header>
      </div>

      <div id="setup-warning" class="setup-warning" hidden></div>

      <p
        id="session-banner"
        class="session-banner"
        hidden
        style="
          margin: 0 0 16px;
          padding: 12px 16px;
          background: #e8eef9;
          border: 1px solid #c5d4f0;
          border-radius: 12px;
          font-size: 0.9rem;
          color: #1e3a5f;
        "
      >
        Сейчас для всех открыты <strong>итоги</strong> опроса.
      </p>

      <div class="layout" id="layout">
        <div class="survey-col" id="survey-root">
          <p class="survey-loading" style="margin: 0; color: var(--muted); text-align: center; padding: 32px 16px">
            Загрузка опроса…
          </p>
        </div>
        <aside class="live-col live-col--hidden" id="live-col">
          <p class="live-title" id="live-title">Итоги опроса</p>
          <p class="live-meta" id="live-meta"></p>
          <div id="live-blocks"></div>
        </aside>
      </div>
    </div>

    <script src="assets/firebase-config.js"></script>
    <script type="module">
      import { initializeApp } from "https://www.gstatic.com/firebasejs/10.14.0/firebase-app.js";
      import { getAuth, signInAnonymously } from "https://www.gstatic.com/firebasejs/10.14.0/firebase-auth.js";
      import {
        getFirestore,
        doc,
        getDoc,
        setDoc,
        onSnapshot,
        runTransaction,
        increment,
      } from "https://www.gstatic.com/firebasejs/10.14.0/firebase-firestore.js";

      const FB = window.OPK_FIREBASE;
      const FIREBASE_CONFIG = FB?.config;
      const POLL_DOC = FB?.pollDoc ?? ["poll", "main"];

      const QUESTIONS = [
        {
          text:
            "С каким ключевым вызовом в управлении персоналом на предприятиях ОПК вы сталкиваетесь сегодня?",
          options: [
            { key: "a", letter: "А", text: "Кадровый голод: острая нехватка инженеров и рабочих на фоне роста гособоронзаказа." },
            { key: "b", letter: "Б", text: "Устаревшие HR-процессы: сложность внедрения цифровых решений из-за «режимки» и бюрократии." },
            { key: "c", letter: "В", text: "Профессиональное выгорание: собственное и ключевых сотрудников из-за высокого стресса и ответственности." },
            { key: "d", letter: "Г", text: "Конкуренция с ИТ и «гражданкой»: не можем предложить сопоставимые зарплаты и условия." },
          ],
        },
        {
          text:
            "Чего, на ваш взгляд, больше всего не хватает HR-лидерам ОПК для эффективной трансформации отрасли?",
          options: [
            { key: "a", letter: "А", text: "Единой площадки для обмена реальными кейсами и практиками (чтобы не «изобретать велосипед»)." },
            { key: "b", letter: "Б", text: "Консолидированной позиции для диалога с государством (GR) по вопросам квот, брони, целевого набора." },
            { key: "c", letter: "В", text: "Доступа к актуальным образовательным программам, созданным специально для ОПК." },
            { key: "d", letter: "Г", text: "«Безопасной среды» для обсуждения провалов, рисков и сложных управленческих дилемм." },
          ],
        },
        {
          text: "Какой формат взаимодействия в рамках профессионального сообщества был бы для вас наиболее ценным?",
          options: [
            { key: "a", letter: "А", text: "Закрытые встречи и мозговые штурмы (офлайн) для решения конкретных задач с равными по статусу коллегами." },
            { key: "b", letter: "Б", text: "Отраслевой банк знаний с доступом к проверенным методикам, кейсам и шаблонам документов." },
            { key: "c", letter: "В", text: "Совместная разработка предложений для Минпромторга, Минобрнауки и других регуляторов." },
            { key: "d", letter: "Г", text: "Менторская поддержка от более опытных коллег и доступ к отраслевым экспертам." },
          ],
        },
        {
          text:
            "Какую компетенцию или ресурс вы лично были бы готовы привнести в закрытое сообщество лидеров ОПК?",
          options: [
            { key: "a", letter: "А", text: "Делиться опытом внедрения HR-проектов (успешным и не очень)." },
            { key: "b", letter: "Б", text: "Участвовать в формировании GR-повестки и работе с регуляторами." },
            { key: "c", letter: "В", text: "Выступать в роли эксперта или ментора по своему профилю." },
            { key: "d", letter: "Г", text: "Пока готов(-а) только слушать и учиться (это важный «безопасный» вариант, который позволит ответить честно большинству)." },
          ],
        },
      ];

      const KEYS = ["a", "b", "c", "d"];

      const SHORT = [
        [
          ["А", "Кадровый голод…"],
          ["Б", "Устаревшие HR-процессы…"],
          ["В", "Выгорание…"],
          ["Г", "Конкуренция с ИТ…"],
        ],
        [
          ["А", "Площадка для кейсов…"],
          ["Б", "Позиция GR…"],
          ["В", "Образование для ОПК…"],
          ["Г", "Безопасная среда…"],
        ],
        [
          ["А", "Офлайн-встречи…"],
          ["Б", "Банк знаний…"],
          ["В", "Предложения регуляторам…"],
          ["Г", "Менторство…"],
        ],
        [
          ["А", "Опыт HR-проектов…"],
          ["Б", "GR-повестка…"],
          ["В", "Эксперт / ментор…"],
          ["Г", "Только слушать…"],
        ],
      ];

      function defaultPoll() {
        return {
          totals: {
            q0: { a: 0, b: 0, c: 0, d: 0 },
            q1: { a: 0, b: 0, c: 0, d: 0 },
            q2: { a: 0, b: 0, c: 0, d: 0 },
            q3: { a: 0, b: 0, c: 0, d: 0 },
          },
          submissionCount: 0,
          visitorCount: 0,
          sessionClosed: false,
        };
      }

      function esc(s) {
        const d = document.createElement("div");
        d.textContent = s;
        return d.innerHTML;
      }

      function isConfigReady() {
        const c = window.OPK_FIREBASE?.config;
        return !!(c && c.apiKey && c.projectId);
      }

      /** Понятная подсказка по коду Firebase (анонимный вход часто уже включён — чаще виноват домен или правила). */
      function initErrorHint(e) {
        const code = e && (e.code || e.name);
        const host = typeof location !== "undefined" ? location.hostname : "";
        const msg = e && e.message ? String(e.message) : "";
        if (code === "auth/unauthorized-domain") {
          return (
            `<strong>Домен не разрешён для входа.</strong> Откройте Firebase Console → <strong>Authentication</strong> → вкладка <strong>Settings</strong> → <strong>Authorized domains</strong> → <strong>Add domain</strong> и добавьте <code>${esc(host || "ваш-домен")}</code> (для GitHub Pages обычно <code>имя.github.io</code>).`
          );
        }
        if (code === "auth/operation-not-allowed") {
          return (
            `<strong>Анонимный провайдер выключен для этого приложения.</strong> Authentication → Sign-in method → Анонимный → Включить. Убедитесь, что открыт тот же проект Firebase, что в <code>assets/firebase-config.js</code> (projectId).`
          );
        }
        if (
          String(code || "").includes("permission-denied") ||
          msg.includes("Permission denied") ||
          msg.includes("Missing or insufficient permissions")
        ) {
          return (
            `<strong>Доступ к базе запрещён правилами Firestore.</strong> Проверьте Rules для <code>poll/...</code>, подколлекций <code>visitors</code> и <code>submissions</code> — см. комментарий в <code>assets/firebase-config.js</code>.`
          );
        }
        if (code === "auth/network-request-failed" || code === "unavailable") {
          return `<strong>Сеть или сервис временно недоступны.</strong> Попробуйте другой интернет / VPN или позже.`;
        }
        return `<strong>Детали:</strong> <code>${esc(String(code || "ошибка"))}</code> — ${esc(String((e && e.message) || e || ""))}`;
      }

      const surveyRoot = document.getElementById("survey-root");
      const liveTitle = document.getElementById("live-title");
      const liveMeta = document.getElementById("live-meta");
      const liveBlocks = document.getElementById("live-blocks");
      const layout = document.getElementById("layout");
      const setupWarning = document.getElementById("setup-warning");
      const sessionBanner = document.getElementById("session-banner");

      let db = null;
      let pollRef = null;
      let auth = null;
      let pollData = defaultPoll();
      let step = 0;
      const answers = [];
      let userDone = false;
      let surveyStarted = false;
      let sending = false;
      let unsub = null;

      function pctFor(totals, k, sum) {
        const v = totals[k] || 0;
        if (sum <= 0) return 0;
        return Math.round((v / sum) * 1000) / 10;
      }

      function renderLive(data) {
        const closed = data.sessionClosed === true;
        const totals = data.totals || defaultPoll().totals;
        if (liveTitle) liveTitle.textContent = closed ? "Итоги опроса" : "Статистика";
        if (liveMeta) {
          liveMeta.innerHTML = closed
            ? `Распределение ответов по вопросам`
            : "";
        }

        let html = "";
        for (let qi = 0; qi < 4; qi++) {
          const t = totals["q" + qi] || { a: 0, b: 0, c: 0, d: 0 };
          const sum = KEYS.reduce((s, key) => s + (t[key] || 0), 0);
          let maxP = 1;
          KEYS.forEach((k) => {
            const p = pctFor(t, k, sum);
            if (p > maxP) maxP = p;
          });
          html += `<div class="mini-block"><p class="mini-q">${esc(QUESTIONS[qi].text)}</p>`;
          for (let oi = 0; oi < 4; oi++) {
            const k = KEYS[oi];
            const p = pctFor(t, k, sum);
            const w = maxP > 0 ? (p / maxP) * 100 : 0;
            const lab = SHORT[qi][oi];
            html += `<div class="mini-row">
              <div class="mini-label"><strong>${esc(lab[0])}</strong> ${esc(lab[1])}</div>
              <div class="mini-track" aria-hidden="true"><div class="mini-fill" style="width:${w}%"></div></div>
              <div><div class="mini-pct">${esc(String(p))}%</div><div class="mini-n">${esc(String(t[k] || 0))}</div></div>
            </div>`;
          }
          html += "</div>";
        }
        liveBlocks.innerHTML = html;
      }

      /** До показа итогов — одна колонка с опросом; после «Показать результат» — скрываем опрос/спасибо, только блок с итогами. */
      function applyLayout() {
        const closed = pollData.sessionClosed === true;
        const liveEl = document.getElementById("live-col");
        if (liveEl) {
          liveEl.classList.toggle("live-col--hidden", !closed);
          liveEl.classList.toggle("big-stats", closed);
        }
        layout.classList.toggle("layout--stats-only", closed);
        layout.classList.toggle("layout--survey-only", !closed);
        document.body.classList.toggle("session-closed", closed);
        if (sessionBanner) sessionBanner.hidden = !closed;
      }

      function renderSurvey() {
        const closed = pollData.sessionClosed === true;
        if (closed) {
          surveyRoot.innerHTML = "";
          return;
        }
        if (userDone) {
          surveyRoot.innerHTML =
            `<div class="thanks">
              <svg width="52" height="52" viewBox="0 0 56 56" fill="none" aria-hidden="true">
                <circle cx="28" cy="28" r="26" stroke="currentColor" stroke-width="2" opacity="0.25"/>
                <path d="M16 28.5l8.5 8.5L40 19" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
              </svg>
              <h1>Спасибо, что прошли опрос</h1>
              <p class="thanks-sub">Результаты появятся после завершения сессии.</p>
            </div>`;
          return;
        }
        if (!surveyStarted) {
          surveyRoot.innerHTML =
            `<div class="welcome">
              <p class="kicker">Опрос · HR и ОПК</p>
              <h1 class="welcome-title">Пульс HR-лидеров<br>оборонной промышленности</h1>
              <p class="welcome-desc">Анонимный опрос для участников мероприятия Академии ПСБ. Займёт не более 2 минут — 4 вопроса с выбором одного варианта ответа.</p>
              <p class="welcome-desc">Ваши ответы помогут сформировать повестку сообщества и увидеть общую картину по отрасли.</p>
              <div class="welcome-actions">
                <button type="button" class="btn-primary" id="btn-start">Начать опрос</button>
              </div>
            </div>`;
          document.getElementById("btn-start").addEventListener("click", () => {
            surveyStarted = true;
            renderSurvey();
          });
          return;
        }

        const q = QUESTIONS[step];
        const sel = answers[step];
        const pct = ((step + 1) / QUESTIONS.length) * 100;
        let opts = "";
        for (let j = 0; j < q.options.length; j++) {
          const o = q.options[j];
          const pressed = sel === o.key ? "true" : "false";
          opts += `<li><button type="button" class="option" data-key="${o.key}" aria-pressed="${pressed}">
            <span class="option-letter">${esc(o.letter)}</span>
            <span class="option-text">${esc(o.text)}</span>
          </button></li>`;
        }
        const backBtn =
          step > 0
            ? `<button type="button" class="btn-ghost" id="btn-back">Назад</button>`
            : `<span style="width:0;flex:0"></span>`;
        const nextLabel = step === QUESTIONS.length - 1 ? "Отправить" : "Далее";
        surveyRoot.innerHTML =
          `<p class="kicker">Опрос · HR и ОПК</p>
          <div class="progress-wrap" role="progressbar" aria-valuenow="${step + 1}" aria-valuemin="1" aria-valuemax="${QUESTIONS.length}">
            <div class="progress-track"><div class="progress-fill" style="width:${pct}%"></div></div>
            <span class="progress-label">Вопрос ${step + 1} из ${QUESTIONS.length}</span>
          </div>
          <div class="panel">
            <h2 class="question-title">${esc(q.text)}</h2>
            <ul class="options" role="list">${opts}</ul>
            <p class="err" id="survey-err" hidden></p>
            <div class="actions">${backBtn}<button type="button" class="btn-primary" id="btn-next" disabled>${esc(nextLabel)}</button></div>
          </div>`;

        surveyRoot.querySelectorAll(".option").forEach((btn) => {
          btn.addEventListener("click", () => {
            const k = btn.getAttribute("data-key");
            answers[step] = k;
            surveyRoot.querySelectorAll(".option").forEach((b) => {
              b.setAttribute("aria-pressed", b.getAttribute("data-key") === k ? "true" : "false");
            });
            document.getElementById("btn-next").disabled = false;
          });
        });
        const next = document.getElementById("btn-next");
        if (step > 0) {
          document.getElementById("btn-back").addEventListener("click", () => {
            step--;
            renderSurvey();
          });
        }
        next.addEventListener("click", () => {
          if (!answers[step]) return;
          if (step < QUESTIONS.length - 1) {
            step++;
            renderSurvey();
            return;
          }
          submitAnswers();
        });
      }

      async function submitAnswers() {
        if (sending || !pollRef || !db || !auth?.currentUser) return;
        sending = true;
        const errEl = document.getElementById("survey-err");
        if (errEl) errEl.hidden = true;
        const btn = document.getElementById("btn-next");
        if (btn) {
          btn.disabled = true;
          btn.textContent = "Отправка…";
        }
        try {
          const ans = [answers[0], answers[1], answers[2], answers[3]];
          if (ans.some((x) => !KEYS.includes(x))) {
            throw new Error("bad answers");
          }
          const uid = auth.currentUser.uid;
          const submissionRef = doc(db, POLL_DOC[0], POLL_DOC[1], "submissions", uid);
          const visitorRef = doc(db, POLL_DOC[0], POLL_DOC[1], "visitors", uid);
          await runTransaction(db, async (transaction) => {
            const subSnap = await transaction.get(submissionRef);
            if (subSnap.exists()) {
              throw new Error("__already_submitted__");
            }
            const vSnap = await transaction.get(visitorRef);
            await transaction.get(pollRef);
            const updates = {};
            for (let i = 0; i < 4; i++) {
              updates[`totals.q${i}.${ans[i]}`] = increment(1);
            }
            updates.submissionCount = increment(1);
            if (!vSnap.exists()) {
              transaction.set(visitorRef, { v: 1 });
              updates.visitorCount = increment(1);
            }
            transaction.set(submissionRef, { s: 1 });
            transaction.update(pollRef, updates);
          });
          userDone = true;
          renderSurvey();
        } catch (e) {
          console.error(e);
          sending = false;
          const msg = e && (e.message || String(e));
          if (msg && String(msg).includes("__already_submitted__")) {
            userDone = true;
            renderSurvey();
            return;
          }
          if (btn) {
            btn.disabled = false;
            btn.textContent = "Отправить";
          }
          if (errEl) {
            errEl.textContent = "Не удалось сохранить. Проверьте сеть и правила Firebase.";
            errEl.hidden = false;
          }
          return;
        }
        sending = false;
      }

      function syncFromPoll(data) {
        pollData = { ...defaultPoll(), ...data };
        if (!pollData.totals) pollData.totals = defaultPoll().totals;
        renderLive(pollData);
        applyLayout();
        renderSurvey();
      }

      function showSetupMessage() {
        setupWarning.hidden = false;
        setupWarning.innerHTML =
          `<strong>Firebase не настроен.</strong> В консоли Firebase: включите <strong>Firestore</strong>, в Authentication → Sign-in method — <strong>Анонимный</strong>, ` +
          `в Authentication → Settings → <strong>Authorized domains</strong> добавьте домен хостинга (например <code>username.github.io</code> или свой сайт). ` +
          `Проверьте <code>assets/firebase-config.js</code>. В Rules нужны <code>visitors/{uid}</code> и <code>submissions/{uid}</code> — см. комментарий в том файле.`;
        if (liveMeta) liveMeta.textContent = "";
        liveBlocks.innerHTML = "";
      }

      /**
       * Один раз на устройство: по UID анонимного Firebase (не localStorage —
       * в WebView/QR он ненадёжен). Документ poll/.../visitors/{uid}.
       */
      async function countVisitorOnce(auth) {
        if (!pollRef || !db || !auth?.currentUser) return;
        const uid = auth.currentUser.uid;
        const visitorRef = doc(db, POLL_DOC[0], POLL_DOC[1], "visitors", uid);
        try {
          await runTransaction(db, async (transaction) => {
            const vSnap = await transaction.get(visitorRef);
            if (vSnap.exists()) return;
            const pSnap = await transaction.get(pollRef);
            if (!pSnap.exists()) {
              transaction.set(pollRef, defaultPoll());
            }
            transaction.set(visitorRef, { v: 1 });
            transaction.update(pollRef, { visitorCount: increment(1) });
          });
        } catch (e) {
          console.error("visitor count:", e);
        }
      }

      async function init() {
        if (!isConfigReady()) {
          showSetupMessage();
          surveyRoot.innerHTML =
            `<p class="kicker">Опрос · HR и ОПК</p>
            <p style="color:var(--muted)">После настройки Firebase здесь появятся вопросы.</p>`;
          return;
        }

        try {
          const app = initializeApp(FIREBASE_CONFIG);
          auth = getAuth(app);
          await signInAnonymously(auth);
          db = getFirestore(app);
          pollRef = doc(db, POLL_DOC[0], POLL_DOC[1]);

          let snap = await getDoc(pollRef);
          if (!snap.exists()) {
            await setDoc(pollRef, defaultPoll());
            snap = await getDoc(pollRef);
          }

          const uid = auth.currentUser.uid;
          const submissionRef = doc(db, POLL_DOC[0], POLL_DOC[1], "submissions", uid);
          const alreadySubmitted = await getDoc(submissionRef);
          if (alreadySubmitted.exists()) userDone = true;

          // Сначала показываем вопросы; учёт визита — отдельной транзакцией (не блокирует первый экран).
          syncFromPoll(snap.exists() ? snap.data() : defaultPoll());

          countVisitorOnce(auth).catch((e) => console.error("visitor count:", e));

          unsub = onSnapshot(
            pollRef,
            (docSnap) => {
              if (docSnap.exists()) syncFromPoll(docSnap.data());
              else syncFromPoll(defaultPoll());
            },
            (err) => {
              console.error(err);
              if (liveMeta) liveMeta.textContent = "Ошибка подписки на данные";
            }
          );
        } catch (e) {
          console.error(e);
          surveyRoot.innerHTML =
            `<p class="kicker">Опрос · HR и ОПК</p>
            <div class="err" style="margin:0;line-height:1.45">
              <p style="margin:0 0 10px"><strong>Не удалось подключиться к опросу.</strong> Ниже — что сделать в первую очередь (часто помогает пункт про домен, даже если анонимный вход уже включён).</p>
              <p style="margin:0">${initErrorHint(e)}</p>
            </div>`;
        }
      }

      init();
    </script>
  </body>
</html>
