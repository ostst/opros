<!DOCTYPE html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#f0f2f6" />
    <title>Опрос — Академия ПСБ</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800;900&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        --bg: #f0f2f6;
        --surface: #ffffff;
        --border: #dde1ea;
        --text: #1c1f26;
        --muted: #5c6473;
        --navy: #2b2c84;
        --orange: #ea5614;
        --navy-soft: rgba(43, 44, 132, 0.08);
        --radius: 16px;
        --radius-sm: 12px;
        --font: "Manrope", system-ui, sans-serif;
        --safe-bottom: env(safe-area-inset-bottom, 0px);
      }
      *,
      *::before,
      *::after {
        box-sizing: border-box;
      }
      html {
        -webkit-text-size-adjust: 100%;
      }
      body {
        margin: 0;
        min-height: 100dvh;
        font-family: var(--font);
        background: var(--bg);
        color: var(--text);
        line-height: 1.45;
      }
      body::before {
        content: "";
        position: fixed;
        inset: 0;
        pointer-events: none;
        background: radial-gradient(ellipse 90% 60% at 50% -15%, rgba(43, 44, 132, 0.07), transparent 50%),
          radial-gradient(ellipse 70% 40% at 100% 100%, rgba(234, 86, 20, 0.05), transparent 45%);
        z-index: 0;
      }
      .shell {
        position: relative;
        z-index: 1;
        max-width: 1180px;
        margin: 0 auto;
        padding: 20px 20px calc(28px + var(--safe-bottom));
      }
      .topbar {
        display: flex;
        align-items: center;
        gap: 16px;
        flex-wrap: wrap;
        margin-bottom: 16px;
      }
      .brand {
        margin-bottom: 0;
      }
      .brand-link {
        display: inline-block;
        line-height: 0;
        text-decoration: none;
      }
      .brand-logo {
        height: 36px;
        width: auto;
        display: block;
      }
      .setup-warning {
        background: #fff8e6;
        border: 1px solid #f0d78c;
        border-radius: var(--radius-sm);
        padding: 14px 16px;
        margin-bottom: 20px;
        font-size: 0.9rem;
        color: #5c4a1a;
      }
      .setup-warning code {
        font-size: 0.82em;
        background: rgba(0, 0, 0, 0.06);
        padding: 2px 6px;
        border-radius: 4px;
      }
      .layout {
        display: block;
        max-width: 640px;
        margin: 0 auto;
      }
      .survey-col {
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: var(--radius);
        padding: 22px 20px 24px;
        box-shadow: 0 4px 24px rgba(28, 31, 38, 0.06);
      }
      .live-title {
        margin: 0 0 12px;
        font-size: 0.75rem;
        letter-spacing: 0.08em;
        text-transform: uppercase;
        color: var(--muted);
        font-weight: 600;
      }
      .live-meta {
        font-size: 0.8125rem;
        color: var(--muted);
        margin: 0 0 14px;
      }
      .live-meta strong {
        color: var(--text);
      }
      .mini-block {
        margin-bottom: 16px;
        padding-bottom: 14px;
        border-bottom: 1px solid var(--border);
      }
      .mini-block:last-child {
        margin-bottom: 0;
        padding-bottom: 0;
        border-bottom: none;
      }
      .mini-q {
        font-size: 0.78rem;
        font-weight: 600;
        color: var(--navy);
        margin: 0 0 8px;
        line-height: 1.35;
      }
      .mini-row {
        display: grid;
        grid-template-columns: 1fr minmax(72px, 28%) auto;
        gap: 6px 8px;
        align-items: center;
        margin-bottom: 6px;
        font-size: 0.72rem;
      }
      @media (max-width: 400px) {
        .mini-row {
          grid-template-columns: 1fr;
        }
      }
      .mini-label {
        color: #3a4150;
        line-height: 1.3;
      }
      .mini-track {
        height: 6px;
        border-radius: 999px;
        background: rgba(43, 44, 132, 0.1);
        overflow: hidden;
      }
      .mini-fill {
        height: 100%;
        border-radius: inherit;
        background: linear-gradient(90deg, var(--navy), #5a5cb8);
        transition: width 0.35s ease;
      }
      .mini-pct {
        font-weight: 700;
        font-size: 0.8rem;
        text-align: right;
        font-variant-numeric: tabular-nums;
      }
      .mini-n {
        font-size: 0.72rem;
        color: var(--muted);
        text-align: right;
      }
      .kicker {
        font-size: 0.75rem;
        letter-spacing: 0.1em;
        text-transform: uppercase;
        color: var(--muted);
        margin: 0 0 14px;
      }
      .progress-wrap {
        display: flex;
        flex-direction: column;
        gap: 8px;
        margin-bottom: 20px;
      }
      .progress-track {
        height: 6px;
        border-radius: 999px;
        background: rgba(43, 44, 132, 0.12);
        overflow: hidden;
      }
      .progress-fill {
        height: 100%;
        border-radius: inherit;
        background: linear-gradient(90deg, var(--navy), #4547b3);
        transition: width 0.35s ease;
      }
      .progress-label {
        font-size: 0.8125rem;
        color: var(--muted);
      }
      .question-title {
        font-size: 1.1rem;
        font-weight: 600;
        margin: 0 0 18px;
        line-height: 1.4;
      }
      @media (min-width: 600px) {
        .question-title {
          font-size: 1.2rem;
        }
      }
      .options {
        list-style: none;
        margin: 0;
        padding: 0;
        display: flex;
        flex-direction: column;
        gap: 10px;
      }
      .option {
        width: 100%;
        display: flex;
        gap: 12px;
        align-items: flex-start;
        text-align: left;
        padding: 14px 16px;
        border-radius: var(--radius-sm);
        border: 1px solid var(--border);
        background: #fafbfc;
        color: var(--text);
        font: inherit;
        cursor: pointer;
        transition: border-color 0.2s ease, box-shadow 0.2s ease, transform 0.15s ease;
        min-height: 48px;
      }
      .option:hover {
        border-color: rgba(43, 44, 132, 0.35);
        box-shadow: 0 4px 14px rgba(43, 44, 132, 0.08);
      }
      .option:active {
        transform: scale(0.99);
      }
      .option[aria-pressed="true"] {
        border-color: var(--navy);
        background: var(--navy-soft);
        box-shadow: 0 0 0 1px rgba(43, 44, 132, 0.2);
      }
      .option-letter {
        flex-shrink: 0;
        width: 28px;
        height: 28px;
        display: flex;
        align-items: center;
        justify-content: center;
        border-radius: 8px;
        font-weight: 700;
        font-size: 0.875rem;
        background: rgba(43, 44, 132, 0.1);
        color: var(--navy);
      }
      .option[aria-pressed="true"] .option-letter {
        background: var(--navy);
        color: #fff;
      }
      .question-hint {
        font-size: 0.875rem;
        color: var(--muted);
        margin: -10px 0 16px;
        line-height: 1.4;
      }
      .option-text {
        font-size: 0.9375rem;
        color: #3a4150;
      }
      .actions {
        display: flex;
        gap: 12px;
        margin-top: 22px;
        padding-top: 8px;
      }
      .btn-primary {
        flex: 1;
        font: inherit;
        font-weight: 600;
        border-radius: 12px;
        padding: 14px 20px;
        border: none;
        cursor: pointer;
        min-height: 48px;
        background: var(--navy);
        color: #fff;
        box-shadow: 0 6px 20px rgba(43, 44, 132, 0.25);
      }
      .btn-primary:hover:not(:disabled) {
        filter: brightness(1.05);
      }
      .btn-primary:disabled {
        opacity: 0.45;
        cursor: not-allowed;
      }
      .btn-ghost {
        flex: 0 0 auto;
        font: inherit;
        font-weight: 600;
        border-radius: 12px;
        padding: 14px 20px;
        min-height: 48px;
        background: var(--surface);
        color: var(--muted);
        border: 1px solid var(--border);
        cursor: pointer;
      }
      .btn-ghost:disabled {
        opacity: 0.45;
        cursor: not-allowed;
      }
      .btn-danger {
        background: #fff;
        color: #b42318;
        border: 1px solid #f5c4c0;
      }
      .err {
        color: #c41e1e;
        font-size: 0.875rem;
        margin: 8px 0 0;
      }
      .thanks {
        text-align: center;
        padding: 28px 8px 12px;
      }
      .thanks svg {
        color: var(--navy);
        margin-bottom: 12px;
      }
      .thanks h1 {
        font-size: 1.25rem;
        margin: 0 0 8px;
      }
      .thanks p {
        margin: 0;
        color: var(--muted);
        font-size: 0.9375rem;
      }
      .thanks-sub {
        margin-top: 12px !important;
        max-width: 22em;
        margin-left: auto;
        margin-right: auto;
      }
      .thanks-num-wrap {
        margin: 24px auto 0;
        padding: 20px 18px;
        max-width: 20rem;
        background: var(--navy-soft);
        border: 1px solid rgba(43, 44, 132, 0.2);
        border-radius: var(--radius-sm);
      }
      .thanks-num-label {
        margin: 0 0 6px;
        font-size: 0.8rem;
        letter-spacing: 0.06em;
        text-transform: uppercase;
        color: var(--muted);
        font-weight: 600;
      }
      .thanks-num-value {
        margin: 0;
        padding: 8px 0 4px;
        font-size: clamp(3.5rem, 14vw, 5.25rem);
        font-weight: 900;
        letter-spacing: -0.03em;
        font-variant-numeric: tabular-nums;
        color: var(--navy);
        line-height: 1;
      }
      .thanks-num-hint {
        margin: 14px 0 0;
        font-size: 0.9rem;
        color: var(--muted);
        line-height: 1.45;
      }
      .session-closed-msg {
        text-align: center;
        padding: 32px 16px 24px;
        max-width: 28rem;
        margin: 0 auto;
      }
      .session-closed-msg h1 {
        font-size: 1.2rem;
        margin: 0 0 10px;
        color: var(--navy);
      }
      .session-closed-msg p {
        margin: 0;
        color: var(--muted);
        font-size: 0.95rem;
        line-height: 1.5;
      }
      .panel {
        display: flex;
        flex-direction: column;
      }
      .big-stats .mini-row {
        font-size: 0.85rem;
      }
      .big-stats .mini-q {
        font-size: 0.95rem;
      }
      .welcome {
        padding: 12px 4px 8px;
      }
      .welcome-title {
        font-size: 1.6rem;
        font-weight: 700;
        line-height: 1.25;
        margin: 0 0 18px;
        color: var(--navy);
      }
      @media (min-width: 600px) {
        .welcome-title {
          font-size: 1.9rem;
        }
      }
      .welcome-desc {
        font-size: 0.9375rem;
        color: var(--muted);
        margin: 0 0 12px;
        line-height: 1.6;
        max-width: 38em;
      }
      .welcome-actions {
        margin-top: 28px;
      }
      .welcome-actions .btn-primary {
        max-width: 240px;
      }
      .winner-modal {
        position: fixed;
        inset: 0;
        z-index: 1000;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 20px;
        box-sizing: border-box;
      }
      .winner-modal[hidden] {
        display: none !important;
      }
      .winner-modal__backdrop {
        position: absolute;
        inset: 0;
        background: rgba(28, 31, 38, 0.55);
        backdrop-filter: blur(4px);
      }
      .winner-modal__card {
        position: relative;
        z-index: 1;
        max-width: 22rem;
        width: 100%;
        padding: 26px 22px 22px;
        background: var(--surface);
        border-radius: var(--radius);
        border: 1px solid var(--border);
        box-shadow: 0 20px 60px rgba(28, 31, 38, 0.2);
        text-align: center;
      }
      .winner-modal__card h2 {
        margin: 0 0 12px;
        font-size: 1.35rem;
        color: var(--navy);
      }
      .winner-modal__card p {
        margin: 0 0 20px;
        font-size: 0.95rem;
        color: var(--text);
        line-height: 1.5;
      }
      .winner-modal__card .btn-primary {
        width: 100%;
      }
    </style>
  </head>
  <body>
    <div class="shell">
      <div class="topbar">
        <header class="brand">
          <a class="brand-link" href="https://psb-academy.ru/" target="_blank" rel="noopener noreferrer">
            <img class="brand-logo" src="assets/logo.svg" width="160" height="44" alt="Академия ПСБ" />
          </a>
        </header>
      </div>

      <div id="setup-warning" class="setup-warning" hidden></div>

      <p
        id="session-banner"
        class="session-banner"
        hidden
        style="
          margin: 0 0 16px;
          padding: 12px 16px;
          background: #e8eef9;
          border: 1px solid #c5d4f0;
          border-radius: 12px;
          font-size: 0.9rem;
          color: #1e3a5f;
        "
      >
        Итоги опроса показаны <strong>на большом экране</strong> мероприятия (не на этом устройстве).
      </p>

      <div class="layout" id="layout">
        <div class="survey-col" id="survey-root">
          <p class="survey-loading" style="margin: 0; color: var(--muted); text-align: center; padding: 32px 16px">
            Загрузка опроса…
          </p>
        </div>
      </div>
    </div>

    <div id="winner-modal" class="winner-modal" hidden>
      <div class="winner-modal__backdrop" aria-hidden="true"></div>
      <div class="winner-modal__card" role="dialog" aria-modal="true" aria-labelledby="winner-modal-title">
        <h2 id="winner-modal-title">Поздравляем!</h2>
        <p id="winner-modal-text"></p>
        <button type="button" class="btn-primary" id="winner-modal-close">Отлично</button>
      </div>
    </div>

    <script src="assets/firebase-config.js"></script>
    <script src="assets/poll-helpers.js"></script>
    <script type="module">
      import { initializeApp } from "https://www.gstatic.com/firebasejs/10.14.0/firebase-app.js";
      import { getAuth, signInAnonymously } from "https://www.gstatic.com/firebasejs/10.14.0/firebase-auth.js";
      import {
        getFirestore,
        doc,
        getDoc,
        setDoc,
        onSnapshot,
        runTransaction,
        increment,
      } from "https://www.gstatic.com/firebasejs/10.14.0/firebase-firestore.js";

      const FB = window.OPK_FIREBASE;
      const FIREBASE_CONFIG = FB?.config;
      const POLL_DOC = FB?.pollDoc ?? ["poll", "main"];

      function defaultPoll() {
        return window.OPK_poll.normalizePoll({});
      }

      function esc(s) {
        const d = document.createElement("div");
        d.textContent = s;
        return d.innerHTML;
      }

      function welcomeTitleHtml(t) {
        return String(t || "")
          .split("\n")
          .map((line) => esc(line))
          .join("<br>");
      }

      /** В тексте первого абзаца можно использовать {{nq}} — подставится число вопросов (жирным). */
      function welcomeLeadHtml(s, nq) {
        const parts = String(s || "").split("{{nq}}");
        return parts.map((p) => esc(p)).join(`<strong>${esc(String(nq))}</strong>`);
      }

      function isConfigReady() {
        const c = window.OPK_FIREBASE?.config;
        return !!(c && c.apiKey && c.projectId);
      }

      /** Понятная подсказка по коду Firebase (анонимный вход часто уже включён — чаще виноват домен или правила). */
      function initErrorHint(e) {
        const code = e && (e.code || e.name);
        const host = typeof location !== "undefined" ? location.hostname : "";
        const msg = e && e.message ? String(e.message) : "";
        if (code === "auth/unauthorized-domain") {
          return (
            `<strong>Домен не разрешён для входа.</strong> Откройте Firebase Console → <strong>Authentication</strong> → вкладка <strong>Settings</strong> → <strong>Authorized domains</strong> → <strong>Add domain</strong> и добавьте <code>${esc(host || "ваш-домен")}</code> (для GitHub Pages обычно <code>имя.github.io</code>).`
          );
        }
        if (code === "auth/operation-not-allowed") {
          return (
            `<strong>Анонимный провайдер выключен для этого приложения.</strong> Authentication → Sign-in method → Анонимный → Включить. Убедитесь, что открыт тот же проект Firebase, что в <code>assets/firebase-config.js</code> (projectId).`
          );
        }
        if (
          String(code || "").includes("permission-denied") ||
          msg.includes("Permission denied") ||
          msg.includes("Missing or insufficient permissions")
        ) {
          return (
            `<strong>Доступ к базе запрещён правилами Firestore.</strong> Проверьте Rules для <code>poll/...</code>, подколлекций <code>visitors</code> и <code>submissions</code> — см. комментарий в <code>assets/firebase-config.js</code>.`
          );
        }
        if (code === "auth/network-request-failed" || code === "unavailable") {
          return `<strong>Сеть или сервис временно недоступны.</strong> Попробуйте другой интернет / VPN или позже.`;
        }
        return `<strong>Детали:</strong> <code>${esc(String(code || "ошибка"))}</code> — ${esc(String((e && e.message) || e || ""))}`;
      }

      const surveyRoot = document.getElementById("survey-root");
      const setupWarning = document.getElementById("setup-warning");
      const sessionBanner = document.getElementById("session-banner");

      let db = null;
      let pollRef = null;
      let auth = null;
      let pollData = defaultPoll();
      let step = 0;
      const answers = [];
      let userDone = false;
      let surveyStarted = false;
      let sending = false;
      let unsub = null;
      /** Порядковый номер участника после отправки анкеты (для розыгрыша). */
      let myParticipantNumber = null;

      function isSessionClosed() {
        return pollData.sessionClosed === true;
      }

      function applySessionBanner() {
        const closed = isSessionClosed();
        document.body.classList.toggle("session-closed", closed);
        if (sessionBanner) sessionBanner.hidden = !closed;
      }

      function thanksHtml() {
        const numStr =
          typeof myParticipantNumber === "number" && !Number.isNaN(myParticipantNumber)
            ? esc(String(myParticipantNumber))
            : "—";
        const numBlock =
          typeof myParticipantNumber === "number" && !Number.isNaN(myParticipantNumber)
            ? `<div class="thanks-num-wrap" role="status">
              <p class="thanks-num-label">Ваш номер участника</p>
              <p class="thanks-num-value">${numStr}</p>
              <p class="thanks-num-hint">Сохраните или сфотографируйте номер — среди всех участников мы выберем трёх победителей для подарка.</p>
            </div>`
            : `<p class="thanks-sub">Номер участника не найден в данных — при розыгрыше ориентируйтесь на объявление ведущего.</p>`;
        const afterLine = isSessionClosed()
          ? `<p class="thanks-sub">Распределение ответов по вариантам — на большом экране мероприятия.</p>`
          : "";
        return (
          `<div class="thanks">
            <svg width="52" height="52" viewBox="0 0 56 56" fill="none" aria-hidden="true">
              <circle cx="28" cy="28" r="26" stroke="currentColor" stroke-width="2" opacity="0.25"/>
              <path d="M16 28.5l8.5 8.5L40 19" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
            <h1>Спасибо, что прошли опрос</h1>
            ${numBlock}
            ${afterLine}
          </div>`
        );
      }

      function renderSurvey() {
        const closed = isSessionClosed();
        if (closed && userDone) {
          surveyRoot.innerHTML = thanksHtml();
          return;
        }
        if (closed && !userDone) {
          surveyRoot.innerHTML =
            `<div class="session-closed-msg">
              <h1>Итоги опроса на большом экране</h1>
              <p>Графики и распределение ответов показываются только на экране мероприятия. Спасибо за участие!</p>
            </div>`;
          return;
        }
        if (userDone) {
          surveyRoot.innerHTML = thanksHtml();
          return;
        }
        if (!surveyStarted) {
          const w = pollData.welcome;
          surveyRoot.innerHTML =
            `<div class="welcome">
              <p class="kicker">${esc(w.kicker)}</p>
              <h1 class="welcome-title">${welcomeTitleHtml(w.title)}</h1>
              <div class="welcome-actions">
                <button type="button" class="btn-primary" id="btn-start">Начать опрос</button>
              </div>
            </div>`;
          document.getElementById("btn-start").addEventListener("click", () => {
            surveyStarted = true;
            const qs = pollData.questions || [];
            answers.length = 0;
            for (let i = 0; i < qs.length; i++) answers.push([]);
            step = 0;
            renderSurvey();
          });
          return;
        }

        const qs = pollData.questions || [];
        if (qs.length === 0) {
          surveyRoot.innerHTML = `<p class="err" style="margin:0">Вопросы не загружены. Обратитесь к организатору.</p>`;
          return;
        }
        const q = qs[step];
        const multi = q.allowMultiple !== false;
        const selArr = Array.isArray(answers[step]) ? answers[step] : [];
        const selSet = new Set(selArr);
        const pct = ((step + 1) / qs.length) * 100;
        let opts = "";
        for (let j = 0; j < q.options.length; j++) {
          const letter = OPK_poll.letterForIndex(j);
          const pressed = selSet.has(j) ? "true" : "false";
          opts += `<li><button type="button" class="option" data-idx="${j}" aria-pressed="${pressed}">
            <span class="option-letter">${esc(letter)}</span>
            <span class="option-text">${esc(q.options[j])}</span>
          </button></li>`;
        }
        const qHint = multi
          ? "Можно отметить один или несколько подходящих вариантов."
          : "Выберите один вариант ответа.";
        const backBtn =
          step > 0
            ? `<button type="button" class="btn-ghost" id="btn-back">Назад</button>`
            : `<span style="width:0;flex:0"></span>`;
        const nextLabel = step === qs.length - 1 ? "Отправить" : "Далее";
        surveyRoot.innerHTML =
          `<p class="kicker">Опрос · HR и ОПК</p>
          <div class="progress-wrap" role="progressbar" aria-valuenow="${step + 1}" aria-valuemin="1" aria-valuemax="${qs.length}">
            <div class="progress-track"><div class="progress-fill" style="width:${pct}%"></div></div>
            <span class="progress-label">Вопрос ${step + 1} из ${qs.length}</span>
          </div>
          <div class="panel">
            <h2 class="question-title">${esc(q.text)}</h2>
            <p class="question-hint">${esc(qHint)}</p>
            <ul class="options" role="list">${opts}</ul>
            <p class="err" id="survey-err" hidden></p>
            <div class="actions">${backBtn}<button type="button" class="btn-primary" id="btn-next" disabled>${esc(nextLabel)}</button></div>
          </div>`;

        surveyRoot.querySelectorAll(".option").forEach((btn) => {
          btn.addEventListener("click", () => {
            const idx = parseInt(btn.getAttribute("data-idx"), 10);
            let arr = Array.isArray(answers[step]) ? [...answers[step]] : [];
            if (multi) {
              const pos = arr.indexOf(idx);
              if (pos >= 0) arr.splice(pos, 1);
              else arr.push(idx);
              arr.sort((a, b) => a - b);
            } else {
              arr = [idx];
            }
            answers[step] = arr;
            surveyRoot.querySelectorAll(".option").forEach((b) => {
              const j = parseInt(b.getAttribute("data-idx"), 10);
              b.setAttribute("aria-pressed", arr.includes(j) ? "true" : "false");
            });
            document.getElementById("btn-next").disabled = arr.length === 0;
          });
        });
        const next = document.getElementById("btn-next");
        if (step > 0) {
          document.getElementById("btn-back").addEventListener("click", () => {
            step--;
            renderSurvey();
          });
        }
        next.disabled = !selArr.length;
        next.addEventListener("click", () => {
          const cur = answers[step];
          if (!Array.isArray(cur) || cur.length === 0) return;
          if (step < qs.length - 1) {
            step++;
            renderSurvey();
            return;
          }
          submitAnswers();
        });
      }

      async function submitAnswers() {
        if (sending || !pollRef || !db || !auth?.currentUser) return;
        sending = true;
        const errEl = document.getElementById("survey-err");
        if (errEl) errEl.hidden = true;
        const btn = document.getElementById("btn-next");
        if (btn) {
          btn.disabled = true;
          btn.textContent = "Отправка…";
        }
        try {
          const qs = pollData.questions || [];
          if (qs.length === 0) throw new Error("bad answers");
          for (let i = 0; i < qs.length; i++) {
            const sel = answers[i];
            if (!Array.isArray(sel) || sel.length === 0) throw new Error("bad answers");
            const seen = new Set();
            for (const oi of sel) {
              if (typeof oi !== "number" || oi < 0 || oi >= qs[i].options.length) throw new Error("bad answers");
              if (seen.has(oi)) throw new Error("bad answers");
              seen.add(oi);
            }
            if (!qs[i].allowMultiple && sel.length > 1) throw new Error("bad answers");
          }
          const uid = auth.currentUser.uid;
          const submissionRef = doc(db, POLL_DOC[0], POLL_DOC[1], "submissions", uid);
          const visitorRef = doc(db, POLL_DOC[0], POLL_DOC[1], "visitors", uid);
          let assignedNumber = null;
          await runTransaction(db, async (transaction) => {
            const subSnap = await transaction.get(submissionRef);
            if (subSnap.exists()) {
              throw new Error("__already_submitted__");
            }
            const vSnap = await transaction.get(visitorRef);
            const pollSnap = await transaction.get(pollRef);
            const subCount = pollSnap.exists() ? Number(pollSnap.data().submissionCount) || 0 : 0;
            assignedNumber = subCount + 1;
            if (!pollSnap.exists()) {
              transaction.set(pollRef, defaultPoll());
            }
            const updates = {};
            for (let i = 0; i < qs.length; i++) {
              for (const oi of answers[i]) {
                updates[`totals.q${i}.${oi}`] = increment(1);
              }
            }
            updates.submissionCount = assignedNumber;
            if (!vSnap.exists()) {
              transaction.set(visitorRef, { v: 1 });
              updates.visitorCount = increment(1);
            }
            transaction.set(submissionRef, { s: 1, participantNumber: assignedNumber });
            transaction.update(pollRef, updates);
          });
          myParticipantNumber = assignedNumber;
          userDone = true;
          renderSurvey();
        } catch (e) {
          console.error(e);
          sending = false;
          const msg = e && (e.message || String(e));
          if (msg && String(msg).includes("__already_submitted__")) {
            userDone = true;
            try {
              const uid = auth.currentUser.uid;
              const submissionRef = doc(db, POLL_DOC[0], POLL_DOC[1], "submissions", uid);
              const subSnap = await getDoc(submissionRef);
              if (subSnap.exists()) {
                const pn = subSnap.data()?.participantNumber;
                if (typeof pn === "number") myParticipantNumber = pn;
              }
            } catch (_) {}
            renderSurvey();
            return;
          }
          if (btn) {
            btn.disabled = false;
            btn.textContent = "Отправить";
          }
          if (errEl) {
            errEl.textContent = "Не удалось сохранить. Проверьте сеть и правила Firebase.";
            errEl.hidden = false;
          }
          return;
        }
        sending = false;
      }

      function maybeShowWinnerModal() {
        const modal = document.getElementById("winner-modal");
        const textEl = document.getElementById("winner-modal-text");
        if (!modal) return;
        const rd = pollData.raffleDraw;
        if (
          !userDone ||
          typeof myParticipantNumber !== "number" ||
          !rd ||
          !Array.isArray(rd.numbers) ||
          !rd.numbers.includes(myParticipantNumber)
        ) {
          modal.hidden = true;
          return;
        }
        const drawId = String(rd.at ?? "");
        if (sessionStorage.getItem("opk_raffle_ack") === drawId) {
          modal.hidden = true;
          return;
        }
        modal.hidden = false;
        if (textEl) {
          textEl.textContent =
            `Ваш номер участника ${myParticipantNumber} выиграл в розыгрыше среди завершивших опрос. Подойдите на сцену за подарком.`;
        }
      }

      function bindWinnerModalClose() {
        const btn = document.getElementById("winner-modal-close");
        if (!btn || btn.dataset.bound === "1") return;
        btn.dataset.bound = "1";
        btn.addEventListener("click", () => {
          const rd = pollData.raffleDraw;
          if (rd && rd.at != null) sessionStorage.setItem("opk_raffle_ack", String(rd.at));
          const modal = document.getElementById("winner-modal");
          if (modal) modal.hidden = true;
        });
      }

      function syncFromPoll(data) {
        const raw = data && typeof data === "object" ? data : {};
        pollData = window.OPK_poll.normalizePoll(raw);
        const n = pollData.questions.length;
        while (answers.length < n) answers.push([]);
        answers.length = n;
        for (let i = 0; i < n; i++) {
          if (!Array.isArray(answers[i])) {
            const v = answers[i];
            answers[i] = typeof v === "number" && !Number.isNaN(v) ? [v] : [];
          }
        }
        if (step >= n) step = Math.max(0, n - 1);
        renderSurvey();
        applySessionBanner();
        maybeShowWinnerModal();
      }

      function showSetupMessage() {
        setupWarning.hidden = false;
        setupWarning.innerHTML =
          `<strong>Firebase не настроен.</strong> В консоли Firebase: включите <strong>Firestore</strong>, в Authentication → Sign-in method — <strong>Анонимный</strong>, ` +
          `в Authentication → Settings → <strong>Authorized domains</strong> добавьте домен хостинга (например <code>username.github.io</code> или свой сайт). ` +
          `Проверьте <code>assets/firebase-config.js</code>. В Rules нужны <code>visitors/{uid}</code> и <code>submissions/{uid}</code> — см. комментарий в том файле.`;
      }

      /**
       * Один раз на устройство: по UID анонимного Firebase (не localStorage —
       * в WebView/QR он ненадёжен). Документ poll/.../visitors/{uid}.
       */
      async function countVisitorOnce(auth) {
        if (!pollRef || !db || !auth?.currentUser) return;
        const uid = auth.currentUser.uid;
        const visitorRef = doc(db, POLL_DOC[0], POLL_DOC[1], "visitors", uid);
        try {
          await runTransaction(db, async (transaction) => {
            const vSnap = await transaction.get(visitorRef);
            if (vSnap.exists()) return;
            const pSnap = await transaction.get(pollRef);
            if (!pSnap.exists()) {
              transaction.set(pollRef, defaultPoll());
            }
            transaction.set(visitorRef, { v: 1 });
            transaction.update(pollRef, { visitorCount: increment(1) });
          });
        } catch (e) {
          console.error("visitor count:", e);
        }
      }

      async function init() {
        if (!isConfigReady()) {
          showSetupMessage();
          surveyRoot.innerHTML =
            `<p class="kicker">Опрос · HR и ОПК</p>
            <p style="color:var(--muted)">После настройки Firebase здесь появятся вопросы.</p>`;
          return;
        }

        try {
          const app = initializeApp(FIREBASE_CONFIG);
          auth = getAuth(app);
          await signInAnonymously(auth);
          db = getFirestore(app);
          pollRef = doc(db, POLL_DOC[0], POLL_DOC[1]);

          let snap = await getDoc(pollRef);
          if (!snap.exists()) {
            await setDoc(pollRef, defaultPoll());
            snap = await getDoc(pollRef);
          }

          const uid = auth.currentUser.uid;
          const submissionRef = doc(db, POLL_DOC[0], POLL_DOC[1], "submissions", uid);
          const alreadySubmitted = await getDoc(submissionRef);
          if (alreadySubmitted.exists()) {
            userDone = true;
            const pn = alreadySubmitted.data()?.participantNumber;
            if (typeof pn === "number") myParticipantNumber = pn;
          }

          // Сначала показываем вопросы; учёт визита — отдельной транзакцией (не блокирует первый экран).
          syncFromPoll(snap.exists() ? snap.data() : defaultPoll());

          onSnapshot(submissionRef, (subSnap) => {
            if (subSnap.exists()) {
              userDone = true;
              const pn = subSnap.data()?.participantNumber;
              if (typeof pn === "number") myParticipantNumber = pn;
            } else if (userDone) {
              /* Документ отправки удалили (сброс в админке) — снова показываем опрос. */
              userDone = false;
              myParticipantNumber = null;
              surveyStarted = false;
              step = 0;
              const qs = pollData.questions || [];
              answers.length = 0;
              for (let i = 0; i < qs.length; i++) answers.push([]);
            }
            renderSurvey();
            maybeShowWinnerModal();
          });

          bindWinnerModalClose();

          countVisitorOnce(auth).catch((e) => console.error("visitor count:", e));

          unsub = onSnapshot(
            pollRef,
            (docSnap) => {
              if (docSnap.exists()) syncFromPoll(docSnap.data());
              else syncFromPoll(defaultPoll());
            },
            (err) => {
              console.error(err);
            }
          );
        } catch (e) {
          console.error(e);
          surveyRoot.innerHTML =
            `<p class="kicker">Опрос · HR и ОПК</p>
            <div class="err" style="margin:0;line-height:1.45">
              <p style="margin:0 0 10px"><strong>Не удалось подключиться к опросу.</strong> Ниже — что сделать в первую очередь (часто помогает пункт про домен, даже если анонимный вход уже включён).</p>
              <p style="margin:0">${initErrorHint(e)}</p>
            </div>`;
        }
      }

      init();
    </script>
  </body>
</html>
